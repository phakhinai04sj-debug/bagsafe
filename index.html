<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Airport Kiosk 4.0 PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Inter:wght@300;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
box-sizing:border-box;
font-family:'Inter','Kanit',sans-serif;
}

body{
margin:0;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
text-align:center;
overflow-x:hidden;
}

/* TOP BAR */
.language-bar{
background:rgba(15,23,42,.95);
padding:15px;
display:flex;
justify-content:center;
align-items:center;
gap:20px;
position:sticky;
top:0;
z-index:50;
box-shadow:0 5px 15px rgba(0,0,0,.4);
}

.language-bar select{
padding:10px 15px;
border-radius:12px;
border:none;
background:#1f2937;
color:white;
font-size:15px;
cursor:pointer;
}

/* HEADER */
header{
padding:40px 20px 30px;
position:relative;
}

.menu-btn{
position:absolute;
left:25px;
top:25px;
font-size:26px;
background:none;
border:none;
color:white;
cursor:pointer;
}

.logo{
font-size:18px;
opacity:.7;
margin-bottom:10px;
}

.clock{
position:absolute;
right:25px;
top:28px;
font-size:14px;
opacity:.7;
}

h1{
font-size:28px;
margin:10px 0 5px;
font-weight:600;
}

#instruction{
font-size:16px;
opacity:.8;
margin-bottom:20px;
}

.message{
font-size:22px;
min-height:50px;
font-weight:500;
margin-top:10px;
transition:.3s;
}

.alert{
color:#ff4d4d;
animation:blink .6s infinite alternate;
}

@keyframes blink{
from{opacity:1}
to{opacity:.4}
}

/* CARD GRID */
.card-group{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
padding:30px 40px 60px;
max-width:1200px;
margin:auto;
}

.card{
background:rgba(31,41,55,.95);
border-radius:25px;
height:200px;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
transition:.3s;
font-size:17px;
font-weight:500;
padding:20px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,.4);
}

.card:hover{
transform:translateY(-6px);
background:#374151;
}

.card.selected{
background:#dc2626;
box-shadow:0 0 35px rgba(220,38,38,.6);
}

/* ADMIN PANEL */
.admin-panel{
display:none;
background:#1f2937;
margin:30px auto;
padding:30px;
border-radius:20px;
max-width:900px;
}

button{
padding:8px 14px;
border:none;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="language-bar">
<button class="menu-btn" onclick="openAdmin()">☰</button>

<select onchange="changeLang(this.value)">
<option value="th">🇹🇭 ไทย</option>
<option value="en">🇺🇸 English</option>
<option value="zh">🇨🇳 中文</option>
<option value="ja">🇯🇵 日本語</option>
<option value="ko">🇰🇷 한국어</option>
<option value="es">🇪🇸 Español</option>
<option value="fr">🇫🇷 Français</option>
<option value="de">🇩🇪 Deutsch</option>
<option value="ru">🇷🇺 Русский</option>
<option value="ar">🇸🇦 العربية</option>
<option value="hi">🇮🇳 हिन्दी</option>
</select>
</div>

<header>
<div class="logo">✈ SMART AIRPORT SYSTEM</div>
<div class="clock" id="clock"></div>
<h1 id="title"></h1>
<div id="instruction"></div>
<div class="message" id="message"></div>
</header>

<div class="card-group" id="cards"></div>

<div class="admin-panel" id="adminPanel">
<h2>Usage Statistics</h2>
<canvas id="chart"></canvas>
<br><br>
<button onclick="clearStats()">Clear Data</button>
</div>

<script>

/* CLOCK */
setInterval(()=>{
document.getElementById("clock").innerText=
new Date().toLocaleTimeString();
},1000);

/* SPEECH ENGINE */
let voices=[];
let currentLang="th";
let speechUnlocked=false;

function loadVoices(){
voices=speechSynthesis.getVoices();
}
speechSynthesis.onvoiceschanged=loadVoices;
loadVoices();

function unlockSpeech(){
if(!speechUnlocked){
speechSynthesis.speak(new SpeechSynthesisUtterance(" "));
speechUnlocked=true;
}
}

function speak(text){
unlockSpeech();
speechSynthesis.cancel();
let utter=new SpeechSynthesisUtterance(text);
utter.lang=langMap[currentLang];
let match=voices.find(v=>v.lang.startsWith(langMap[currentLang].split("-")[0]));
if(match) utter.voice=match;
utter.rate=0.95;
utter.pitch=1;
speechSynthesis.speak(utter);
}

const langMap={
th:"th-TH",en:"en-US",zh:"zh-CN",ja:"ja-JP",ko:"ko-KR",
es:"es-ES",fr:"fr-FR",de:"de-DE",ru:"ru-RU",ar:"ar-SA",hi:"hi-IN"
};

warning:"ห้ามโหลดใต้ท้องเครื่อง กรุณาถือขึ้นเครื่อง",ask:"กรุณาสอบถามเจ้าหน้าที่"},

warning:"Not permitted in checked baggage",ask:"Please ask airport staff"},

items:["充电宝","电池","电子烟","笔记本","打火机","爆炸物","化学品",
