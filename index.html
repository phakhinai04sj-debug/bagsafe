<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Airport Safety Kiosk</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

header{
background:#1e293b;
padding:20px;
font-size:28px;
font-weight:bold;
}

.language{
margin:20px;
padding:10px;
font-size:16px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
padding:30px;
}

.item{
background:#1e293b;
padding:20px;
border-radius:15px;
font-size:18px;
transition:0.3s;
}

.item:hover{
background:#334155;
transform:scale(1.05);
}

.icon{
font-size:60px;
margin-bottom:10px;
}

</style>
</head>

<body>

<header id="title">
Prohibited Items
</header>

<select class="language" onchange="changeLanguage(this.value)">

<option value="en">English</option>
<option value="th">ไทย</option>
<option value="zh">中文</option>
<option value="ja">日本語</option>
<option value="ko">한국어</option>
<option value="ar">العربية</option>
<option value="ru">Русский</option>
<option value="fr">Français</option>
<option value="de">Deutsch</option>
<option value="es">Español</option>
<option value="hi">हिन्दी</option>

</select>

<div class="grid">

<div class="item">
<div class="icon">🔋</div>
<p id="powerbank">Power Bank</p>
</div>

<div class="item">
<div class="icon">🔥</div>
<p id="lighter">Lighter</p>
</div>

<div class="item">
<div class="icon">🔪</div>
<p id="knife">Knife</p>
</div>

<div class="item">
<div class="icon">💣</div>
<p id="explosive">Explosive</p>
</div>

<div class="item">
<div class="icon">🧴</div>
<p id="spray">Spray</p>
</div>

<div class="item">
<div class="icon">🔋</div>
<p id="battery">Battery</p>
</div>

<div class="item">
<div class="icon">⚡</div>
<p id="electric">Electric Device</p>
</div>

<div class="item">
<div class="icon">🧨</div>
<p id="firework">Fireworks</p>
</div>

</div>

<script>

const lang = {

en:{

knife:"Knife",

function changeLanguage(language){

document.getElementById("title").innerText=lang[language].title
document.getElementById("powerbank").innerText=lang[language].powerbank
document.getElementById("lighter").innerText=lang[language].lighter
document.getElementById("knife").innerText=lang[language].knife
document.getElementById("explosive").innerText=lang[language].explosive
document.getElementById("spray").innerText=lang[language].spray
document.getElementById("battery").innerText=lang[language].battery
document.getElementById("electric").innerText=lang[language].electric

}

</script>

</body>
</html>
