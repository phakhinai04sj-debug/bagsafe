<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Airport Kiosk 4.0 PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Inter:wght@300;500;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
font-family:'Inter','Kanit',sans-serif;
}

body{
margin:0;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
text-align:center;
}

/* TOP BAR */

.topbar{
display:flex;
align-items:center;
justify-content:space-between;
padding:12px 20px;
background:#0f172a;
box-shadow:0 4px 10px rgba(0,0,0,.4);
}

.center-menu{
font-size:28px;
cursor:pointer;
}

.clock{
font-size:14px;
opacity:.8;
}

.language-select{
padding:8px 12px;
border-radius:10px;
border:none;
background:#1f2937;
color:white;
font-size:14px;
}

/* HEADER */

header{
padding:30px 20px;
}

h1{
font-size:28px;
margin-bottom:5px;
}

#instruction{
opacity:.8;
margin-bottom:20px;
}

.message{
font-size:22px;
min-height:50px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:25px;
padding:30px;
max-width:1100px;
margin:auto;
}

.card{
background:#1f2937;
border-radius:20px;
padding:20px;
cursor:pointer;
transition:.3s;
box-shadow:0 8px 20px rgba(0,0,0,.4);
}

.card:hover{
transform:translateY(-6px);
background:#374151;
}

.card img{
width:80px;
height:80px;
object-fit:contain;
margin-bottom:10px;
}

.card-text{
font-size:16px;
}

.alert{
color:#ff4d4d;
font-weight:bold;
}

</style>
</head>

<body>

<div class="topbar">

<div class="clock" id="clock"></div>

<div class="center-menu" onclick="toggleFull()">☰</div>

<select class="language-select" onchange="changeLang(this.value)">
<option value="th">🇹🇭 ไทย</option>
<option value="en">🇺🇸 English</option>
<option value="zh">🇨🇳 中文</option>
<option value="ja">🇯🇵 日本語</option>
<option value="ko">🇰🇷 한국어</option>
<option value="es">🇪🇸 Español</option>
<option value="fr">🇫🇷 Français</option>
<option value="de">🇩🇪 Deutsch</option>
<option value="ru">🇷🇺 Русский</option>
<option value="ar">🇸🇦 العربية</option>
<option value="hi">🇮🇳 हिन्दी</option>
</select>

</div>

<header>

<h1 id="title"></h1>
<div id="instruction"></div>

<div class="message" id="message"></div>

</header>

<div class="grid" id="grid"></div>

<script>

/* CLOCK */

setInterval(()=>{
document.getElementById("clock").innerText=
new Date().toLocaleTimeString();
},1000);


/* FULLSCREEN */

function toggleFull(){

if(!document.fullscreenElement){

document.documentElement.requestFullscreen();

}else{

document.exitFullscreen();

}

}


/* SPEECH */

let voices=[];
speechSynthesis.onvoiceschanged=()=>{voices=speechSynthesis.getVoices();};

function speak(text,lang){

speechSynthesis.cancel();

let utter=new SpeechSynthesisUtterance(text);
utter.lang=lang;

let voice=voices.find(v=>v.lang.startsWith(lang.split("-")[0]));
if(voice) utter.voice=voice;

speechSynthesis.speak(utter);

}


/* LANG MAP */

const langMap={
th:"th-TH",
en:"en-US",
zh:"zh-CN",
ja:"ja-JP",
ko:"ko-KR",
es:"es-ES",
fr:"fr-FR",
de:"de-DE",
ru:"ru-RU",
ar:"ar-SA",
hi:"hi-IN"
};


/* TRANSLATIONS */

const translations={

th:{
title:"สิ่งของห้ามโหลดใต้ท้องเครื่อง",
instruction:"กรุณาเลือกสิ่งของ",
warning:"ห้ามโหลดใต้ท้องเครื่อง กรุณาถือขึ้นเครื่อง",
items:[
"พาวเวอร์แบงค์",
"แบตเตอรี่",
"บุหรี่ไฟฟ้า",
"โน้ตบุ๊ก",
"ไฟแช็ก",
"วัตถุระเบิด",
"สารเคมี",
"อาวุธ",
"ไม่แน่ใจ"
]},

en:{
title:"Prohibited Items",
instruction:"Please select an item",
warning:"Not allowed in checked baggage",
items:[
"Power Bank",
"Battery",
"E-Cigarette",
"Laptop",
"Lighter",
"Explosives",
"Chemical",
"Weapon",
"Not Sure"
]},

zh:{
title:"禁止托运物品",
instruction:"请选择物品",
warning:"禁止托运，请随身携带",
items:["充电宝","电池","电子烟","笔记本电脑","打火机","爆炸物","化学品","武器","不确定"]
},

ja:{
title:"預け荷物禁止品",
instruction:"項目を選択してください",
warning:"受託手荷物に入れないでください",
items:["モバイルバッテリー","電池","電子タバコ","ノートパソコン","ライター","爆発物","化学物質","武器","不明"]
},

ko:{
title:"위탁 수하물 금지 물품",
instruction:"물건을 선택하세요",
warning:"위탁 수하물에 넣을 수 없습니다",
items:["보조배터리","배터리","전자담배","노트북","라이터","폭발물","화학물질","무기","확실하지 않음"]
},

es:{
title:"Artículos prohibidos",
instruction:"Seleccione un artículo",
warning:"No permitido en equipaje facturado",
items:["Power bank","Batería","Cigarrillo electrónico","Laptop","Encendedor","Explosivos","Químicos","Arma","No seguro"]
},

fr:{
title:"Objets interdits",
instruction:"Sélectionnez un objet",
warning:"Interdit en bagage enregistré",
items:["Batterie externe","Batterie","Cigarette électronique","Ordinateur portable","Briquet","Explosifs","Produits chimiques","Arme","Pas sûr"]
},

de:{
title:"Verbotene Gegenstände",
instruction:"Bitte wählen",
warning:"Nicht im aufgegebenen Gepäck erlaubt",
items:["Powerbank","Batterie","E-Zigarette","Laptop","Feuerzeug","Explosivstoffe","Chemikalien","Waffe","Unsicher"]
},

ru:{
title:"Запрещённые предметы",
instruction:"Выберите предмет",
warning:"Нельзя сдавать в багаж",
items:["Пауэрбанк","Батарея","Электронная сигарета","Ноутбук","Зажигалка","Взрывчатка","Химикаты","Оружие","Не уверен"]
},

ar:{
title:"مواد محظورة",
instruction:"اختر العنصر",
warning:"ممنوع في الأمتعة المسجلة",
items:["باور بانك","بطارية","سيجارة إلكترونية","لابتوب","ولاعة","متفجرات","مواد كيميائية","سلاح","غير متأكد"]
},

hi:{
title:"प्रतिबंधित वस्तुएँ",
instruction:"कृपया वस्तु चुनें",
warning:"चेक-इन बैग में अनुमति नहीं",
items:["पावर बैंक","बैटरी","ई-सिगरेट","लैपटॉप","लाइटर","विस्फोटक","रसायन","हथियार","निश्चित नहीं"]
}

};


/* IMAGE MAP */

const images=[
"https://cdn-icons-png.flaticon.com/512/3103/3103446.png",
"https://cdn-icons-png.flaticon.com/512/633/633611.png",
"https://cdn-icons-png.flaticon.com/512/2933/2933245.png",
"https://cdn-icons-png.flaticon.com/512/3474/3474360.png",
"https://cdn-icons-png.flaticon.com/512/1046/1046784.png",
"https://cdn-icons-png.flaticon.com/512/1995/1995574.png",
"https://cdn-icons-png.flaticon.com/512/2917/2917990.png",
"https://cdn-icons-png.flaticon.com/512/3075/3075977.png",
"https://cdn-icons-png.flaticon.com/512/1828/1828843.png"
];


/* BUILD UI */

let currentLang="th";

function render(){

let data=translations[currentLang];

document.getElementById("title").innerText=data.title;
document.getElementById("instruction").innerText=data.instruction;

let grid=document.getElementById("grid");

grid.innerHTML="";

data.items.forEach((item,i)=>{

let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${images[i]}">
<div class="card-text">${item}</div>
`;

card.onclick=()=>{

document.getElementById("message").innerHTML=
'<span class="alert">'+data.warning+'</span>';

speak(data.warning,langMap[currentLang]);

};

grid.appendChild(card);

});

}


function changeLang(lang){

currentLang=lang;
render();

}


/* START */

render();

</script>

</body>
</html>
