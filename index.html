<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Airport Kiosk 4.0 PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Inter:wght@300;500;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
font-family:'Inter','Kanit',sans-serif;
}

body{
margin:0;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
text-align:center;
}

/* TOP BAR */

.language-bar{
background:#0f172a;
padding:12px 20px;
display:flex;
align-items:center;
justify-content:space-between;
position:sticky;
top:0;
z-index:100;
box-shadow:0 4px 15px rgba(0,0,0,.4);
}

.center{
position:absolute;
left:50%;
transform:translateX(-50%);
}

.language-bar select{
padding:8px 14px;
border-radius:10px;
border:none;
background:#1f2937;
color:white;
}

/* HEADER */

header{
padding:40px 20px;
}

.logo{
opacity:.7;
margin-bottom:10px;
}

h1{
font-size:28px;
margin:10px 0;
}

#instruction{
opacity:.8;
margin-bottom:20px;
}

.message{
font-size:22px;
min-height:50px;
font-weight:500;
}

/* CARDS */

.card-group{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
padding:30px;
max-width:1200px;
margin:auto;
}

.card{
border-radius:25px;
height:220px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:18px;
padding:20px;
transition:.3s;
font-weight:500;
}

.card img{
width:70px;
margin-bottom:10px;
}

.card:hover{
transform:translateY(-6px);
}

/* COLORS */

.danger{ background:#dc2626; }
.safe{ background:#16a34a; }
.unknown{ background:#eab308; color:black; }

</style>
</head>

<body>

<div class="language-bar">
<div class="center">

<select onchange="changeLang(this.value)">
<option value="th">🇹🇭 ไทย</option>
<option value="en">🇺🇸 English</option>
<option value="zh">🇨🇳 中文</option>
<option value="ja">🇯🇵 日本語</option>
<option value="ko">🇰🇷 한국어</option>
<option value="es">🇪🇸 Español</option>
<option value="fr">🇫🇷 Français</option>
<option value="de">🇩🇪 Deutsch</option>
<option value="ru">🇷🇺 Русский</option>
<option value="ar">🇸🇦 العربية</option>
<option value="hi">🇮🇳 हिन्दी</option>
</select>

</div>
</div>

<header>

<div class="logo">✈ SMART AIRPORT SYSTEM</div>
<h1 id="title"></h1>
<div id="instruction"></div>
<div class="message" id="message"></div>

</header>

<div class="card-group" id="cards"></div>

<script>

let currentLang="th"

const langMap={
th:"th-TH",
en:"en-US",
zh:"zh-CN",
ja:"ja-JP",
ko:"ko-KR",
es:"es-ES",
fr:"fr-FR",
de:"de-DE",
ru:"ru-RU",
ar:"ar-SA",
hi:"hi-IN"
}

function speak(text){
speechSynthesis.cancel()
let msg=new SpeechSynthesisUtterance(text)
msg.lang=langMap[currentLang]
speechSynthesis.speak(msg)
}

function changeLang(lang){
currentLang=lang
loadUI()
}

/* รูปภาพ */

const images=[
"https://cdn-icons-png.flaticon.com/512/1048/1048953.png",
"https://cdn-icons-png.flaticon.com/512/3103/3103446.png",
"https://cdn-icons-png.flaticon.com/512/2933/2933245.png",
"https://cdn-icons-png.flaticon.com/512/3474/3474360.png",
"https://cdn-icons-png.flaticon.com/512/1046/1046784.png",
"https://cdn-icons-png.flaticon.com/512/616/616490.png",
"https://cdn-icons-png.flaticon.com/512/2917/2917990.png",
"https://cdn-icons-png.flaticon.com/512/3075/3075977.png",
"https://cdn-icons-png.flaticon.com/512/1828/1828843.png",
"https://cdn-icons-png.flaticon.com/512/190/190411.png"
]

const translations={

th:{
title:"สิ่งของห้ามโหลดใต้ท้องเครื่อง",
instruction:"กรุณาเลือกสิ่งของในกระเป๋าของคุณ",
items:["พาวเวอร์แบงค์","แบตเตอรี่","บุหรี่ไฟฟ้า","โน้ตบุ๊ก","ไฟแช็ก","วัตถุระเบิด","สารเคมี","อาวุธ","ไม่แน่ใจ","ไม่มีวัตถุอันตราย"],
warning:"ไม่สามารถโหลดใต้ท้องเครื่อง กรุณาถือขึ้นเครื่อง",
ask:"กรุณาสอบถามเจ้าหน้าที่สนามบิน",
safe:"ไม่มีวัตถุอันตราย สามารถโหลดกระเป๋าได้"
},

en:{
title:"Prohibited Items",
instruction:"Please select an item",
items:["Power Bank","Battery","E-Cigarette","Laptop","Lighter","Explosive","Chemical","Weapon","Unsure","No Dangerous Items"],
warning:"Not allowed in checked baggage",

},

title:"托运行李禁止物品",
instruction:"请选择您的物品",
items:["充电宝","电池","电子烟","笔记本电脑","打火机","爆炸物","化学品","武器","不确定","没有危险物品"],
warning:"禁止托运",
ask:"请咨询工作人员",
safe:"没有危险物品"
},

ja:{
title:"預け荷物禁止物",
instruction:"物品を選択してください",
items:["モバイルバッテリー","電池","電子タバコ","ノートパソコン","ライター","爆発物","化学物質","武器","不明","危険物なし"],
warning:"預け入れ不可",
ask:"係員にお尋ねください",
safe:"危険物はありません"
},

ko:{
title:"위탁 수하물 금지 물품",
instruction:"물품을 선택하세요",
items:["보조배터리","배터리","전자담배","노트북","라이터","폭발물","화학물질","무기","잘 모름","위험물 없음"],
warning:"위탁 수하물 금지",
ask:"직원에게 문의하세요",
safe:"위험 물품이 없습니다"
},

es:{
title:"Artículos prohibidos",
instruction:"Seleccione un artículo",
items:["Batería portátil","Batería","Cigarrillo electrónico","Portátil","Encendedor","Explosivo","Químico","Arma","No seguro","Sin objetos peligrosos"],
warning:"No permitido",

safe:"No hay objetos peligrosos"
},

fr:{
title:"Articles interdits",
instruction:"Sélectionnez un article",
items:["Batterie externe","Batterie","Cigarette électronique","Ordinateur portable","Briquet","Explosif","Produit chimique","Arme","Pas sûr","Aucun objet dangereux"],
warning:"Interdit en soute",
ask:"Veuillez demander au personnel",
safe:"Aucun objet dangereux"
},

title:"Verbotene Gegenstände",

warning:"Nicht erlaubt",

},

title:"Запрещённые предметы",

},

title:"مواد محظورة",
instruction:"اختر عنصرا",

warning:"ممنوع",

},

hi:{
title:"प्रतिबंधित वस्तुएँ",
instruction:"कृपया वस्तु चुनें",
items:["पावर बैंक","बैटरी","ई-सिगरेट","लैपटॉप","लाइटर","विस्फोटक","रसायन","हथियार","पता नहीं","कोई खतरनाक वस्तु नहीं"],
warning:"अनुमति नहीं",
ask:"स्टाफ से पूछें",
safe:"कोई खतरनाक वस्तु नहीं"

}

function loadUI(){

let t=translations[currentLang]

title.innerText=t.title
instruction.innerText=t.instruction

cards.innerHTML=""

t.items.forEach((item,i)=>{

let c=document.createElement("div")

c.className="card"

if(i==9) c.classList.add("safe")
else if(i==8) c.classList.add("unknown")
else c.classList.add("danger")

c.innerHTML=`<img src="${images[i]}"><div>${item}</div>`

c.onclick=()=>selectItem(i)

cards.appendChild(c)

})

}

function selectItem(i){

let t=translations[currentLang]

let text=""

if(i==9) text=t.safe
else if(i==8) text=t.ask
else text=t.warning

message.innerText=text
speak(text)

}

loadUI()

</script>

</body>
</html>
