<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Airport Kiosk 4.0 PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Kanit;
background:#0f172a;
color:white;
text-align:center;
}

.language-bar{
display:flex;
justify-content:space-between;
align-items:center;
background:#020617;
padding:12px 20px;
}

.menu-btn{
font-size:26px;
background:none;
border:none;
color:white;
cursor:pointer;
}

select{
padding:8px;
border-radius:8px;
background:#1f2937;
color:white;
border:none;
}

.clock{
font-size:14px;
opacity:.8;
}

header{
padding:30px;
}

.card-group{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:25px;
padding:30px;
max-width:1200px;
margin:auto;
}

.card{
border-radius:20px;
height:200px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
cursor:pointer;
font-size:18px;
padding:15px;
}

.card img{
width:60px;
margin-bottom:10px;
}

.red{background:#dc2626;}
.yellow{background:#eab308;}
.green{background:#16a34a;}

.message{
font-size:22px;
margin-top:20px;
}

.menu{
display:none;
position:absolute;
top:50px;
left:20px;
background:#1f2937;
padding:10px;
border-radius:10px;
}

.menu button{
display:block;
margin:5px;
padding:8px 12px;
width:150px;
}

.admin-panel{
display:none;
max-width:900px;
margin:auto;
background:#1f2937;
padding:20px;
border-radius:20px;
}

</style>
</head>

<body>

<div class="language-bar">

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<select onchange="changeLang(this.value)">
<option value="th">ไทย</option>
<option value="en">English</option>
<option value="zh">中文</option>
<option value="ja">日本語</option>
<option value="ko">한국어</option>
<option value="es">Español</option>
<option value="fr">Français</option>
<option value="de">Deutsch</option>
<option value="ru">Русский</option>
<option value="ar">العربية</option>
<option value="hi">हिन्दी</option>
</select>

<div class="clock" id="clock"></div>

</div>

<div class="menu" id="menu">
<button onclick="adminLogin()">Admin Panel</button>
<button onclick="toggleFull()">Fullscreen</button>
<button onclick="resetData()">Reset Data</button>
</div>

<header>

<h1 id="title"></h1>
<div id="instruction"></div>

<div class="message" id="message"></div>

</header>

<div class="card-group" id="cards"></div>

<div class="admin-panel" id="adminPanel">
<h2>Usage Statistics</h2>
<canvas id="chart"></canvas>
</div>

<script>

setInterval(()=>{
clock.innerText=new Date().toLocaleTimeString()
},1000)

function toggleMenu(){
let m=document.getElementById("menu")
m.style.display=m.style.display=="block"?"none":"block"
}

function toggleFull(){
if(!document.fullscreenElement){
document.documentElement.requestFullscreen()
}else{
document.exitFullscreen()
}
}

function adminLogin(){
let p=prompt("Password")
if(p=="654321"){
adminPanel.style.display="block"
drawChart()
}else{
alert("Wrong Password")
}
}

let currentLang="th"

const langMap={
th:"th-TH",
en:"en-US",
zh:"zh-CN",
ja:"ja-JP",
ko:"ko-KR",
es:"es-ES",
fr:"fr-FR",
de:"de-DE",
ru:"ru-RU",
ar:"ar-SA",
hi:"hi-IN"
}

function speak(text){
speechSynthesis.cancel()
let msg=new SpeechSynthesisUtterance(text)
msg.lang=langMap[currentLang]
speechSynthesis.speak(msg)
}

let stats=JSON.parse(localStorage.getItem("stats"))||Array(10).fill(0)

function saveStats(){
localStorage.setItem("stats",JSON.stringify(stats))
}

function resetData(){
stats=Array(10).fill(0)
saveStats()
alert("Reset Complete")
}

const images=[
"https://cdn-icons-png.flaticon.com/512/1048/1048953.png",
"https://cdn-icons-png.flaticon.com/512/3103/3103446.png",
"https://cdn-icons-png.flaticon.com/512/2933/2933245.png",
"https://cdn-icons-png.flaticon.com/512/3474/3474360.png",
"https://cdn-icons-png.flaticon.com/512/1046/1046784.png",
"https://cdn-icons-png.flaticon.com/512/616/616490.png",
"https://cdn-icons-png.flaticon.com/512/2917/2917990.png",
"https://cdn-icons-png.flaticon.com/512/3075/3075977.png",
"https://cdn-icons-png.flaticon.com/512/1828/1828843.png",
"https://cdn-icons-png.flaticon.com/512/190/190411.png"
]

const translations={

th:{
title:"สิ่งของห้ามโหลดใต้ท้องเครื่อง",
instruction:"กรุณาเลือกสิ่งของ",
items:["พาวเวอร์แบงค์","แบตเตอรี่","บุหรี่ไฟฟ้า","โน้ตบุ๊ก","ไฟแช็ก","วัตถุระเบิด","สารเคมี","อาวุธ","ไม่แน่ใจ","ไม่มีวัตถุอันตราย"],
warning:"ห้ามโหลดใต้ท้องเครื่อง",
ask:"กรุณาสอบถามเจ้าหน้าที่",
safe:"สามารถโหลดใต้เครื่องได้"
},

en:{
title:"Prohibited Items",
instruction:"Select item",
items:["Power Bank","Battery","E-Cigarette","Laptop","Lighter","Explosive","Chemical","Weapon","Unsure","No Dangerous Item"],
warning:"Not allowed in checked baggage",
ask:"Please ask staff",
safe:"Safe for checked baggage"
},

zh:{
title:"禁止托运物品",
instruction:"请选择",
items:["充电宝","电池","电子烟","笔记本电脑","打火机","爆炸物","化学品","武器","不确定","没有危险物"],
warning:"禁止托运",
ask:"请咨询工作人员",
safe:"可以托运"
},

ja:{
title:"預け荷物禁止",
instruction:"選択してください",
items:["モバイルバッテリー","電池","電子タバコ","ノートパソコン","ライター","爆発物","化学物質","武器","不明","危険物なし"],
warning:"預け不可",
ask:"係員に確認",
safe:"預け可能"
},

ko:{
title:"위탁 수하물 금지",
instruction:"선택하세요",
items:["보조배터리","배터리","전자담배","노트북","라이터","폭발물","화학물질","무기","잘 모름","위험물 없음"],
warning:"위탁 금지",
ask:"직원에게 문의",
safe:"위탁 가능"
},

es:{
title:"Artículos prohibidos",
instruction:"Seleccione",
items:["Power Bank","Batería","Cigarrillo electrónico","Laptop","Encendedor","Explosivo","Químico","Arma","No seguro","Sin objeto peligroso"],
warning:"No permitido",
ask:"Pregunte al personal",
safe:"Permitido"
},

fr:{
title:"Articles interdits",
instruction:"Sélectionnez",
items:["Batterie externe","Batterie","E-cigarette","Ordinateur","Briquet","Explosif","Produit chimique","Arme","Pas sûr","Aucun danger"],
warning:"Interdit",
ask:"Demandez au personnel",
safe:"Autorisé"
},

de:{
title:"Verbotene Gegenstände",
instruction:"Auswählen",
items:["Powerbank","Batterie","E-Zigarette","Laptop","Feuerzeug","Explosiv","Chemikalie","Waffe","Unsicher","Kein Gefahrgut"],
warning:"Nicht erlaubt",
ask:"Personal fragen",
safe:"Erlaubt"
},

ru:{
title:"Запрещенные предметы",
instruction:"Выберите",
items:["Пауэрбанк","Батарея","Электронная сигарета","Ноутбук","Зажигалка","Взрывчатка","Химия","Оружие","Не уверен","Нет опасных предметов"],
warning:"Запрещено",
ask:"Спросите сотрудника",
safe:"Разрешено"
},

ar:{
title:"مواد محظورة",
instruction:"اختر",
items:["بنك طاقة","بطارية","سيجارة إلكترونية","كمبيوتر","ولاعة","متفجرات","مواد كيميائية","سلاح","غير متأكد","لا مواد خطرة"],
warning:"ممنوع",
ask:"اسأل الموظف",
safe:"مسموح"
},

hi:{
title:"प्रतिबंधित वस्तुएँ",
instruction:"चुनें",
items:["पावर बैंक","बैटरी","ई-सिगरेट","लैपटॉप","लाइटर","विस्फोटक","रसायन","हथियार","पता नहीं","कोई खतरनाक वस्तु नहीं"],
warning:"अनुमति नहीं",
ask:"स्टाफ से पूछें",
safe:"अनुमति है"
}

}

function changeLang(l){
currentLang=l
loadUI()
}

function loadUI(){

let t=translations[currentLang]

title.innerText=t.title
instruction.innerText=t.instruction

cards.innerHTML=""

t.items.forEach((item,i)=>{

let card=document.createElement("div")

let color="red"

if(i==8) color="yellow"
if(i==9) color="green"

card.className="card "+color

card.innerHTML=`<img src="${images[i]}"><div>${item}</div>`

card.onclick=()=>selectItem(i)

cards.appendChild(card)

})

}

function beep(){
let ctx=new AudioContext()
let osc=ctx.createOscillator()
osc.connect(ctx.destination)
osc.start()
osc.stop(ctx.currentTime+0.1)
}

function selectItem(i){

let t=translations[currentLang]

stats[i]++
saveStats()

let text=""

if(i==8) text=t.ask
else if(i==9) text=t.safe
else{
text=t.warning
beep()
}

message.innerText=text

speak(text)

}

function drawChart(){

new Chart(chart,{
type:"bar",
data:{
labels:translations.th.items,
datasets:[{
label:"Usage",
data:stats
}]
}
})

}

loadUI()

</script>

</body>
</html>
