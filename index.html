<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Smart Airport Safety Kiosk</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b1f3a;
color:white;
text-align:center;
}

h1{
margin-top:30px;
font-size:38px;
}

.language-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
padding:30px;
}

.lang-btn{
padding:18px;
font-size:18px;
border:none;
border-radius:10px;
background:#1f6feb;
color:white;
cursor:pointer;
}

.lang-btn:hover{
background:#388bfd;
}

.items{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
padding:30px;
}

.item{
background:white;
color:black;
border-radius:12px;
padding:10px;
}

.item img{
width:100%;
height:150px;
object-fit:contain;
}

.buttons{
margin-top:30px;
}

.confirm{
padding:15px 30px;
font-size:20px;
margin:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

.yes{background:#d73a49;color:white;}
.no{background:#2ea043;color:white;}

</style>
</head>

<body>

<h1 id="title">กรุณาเลือกภาษา</h1>

<div class="language-grid">

<button class="lang-btn" onclick="setLang('th')">ไทย</button>
<button class="lang-btn" onclick="setLang('en')">English</button>
<button class="lang-btn" onclick="setLang('zh')">中文</button>
<button class="lang-btn" onclick="setLang('ja')">日本語</button>
<button class="lang-btn" onclick="setLang('ko')">한국어</button>
<button class="lang-btn" onclick="setLang('es')">Español</button>
<button class="lang-btn" onclick="setLang('fr')">Français</button>
<button class="lang-btn" onclick="setLang('de')">Deutsch</button>
<button class="lang-btn" onclick="setLang('ru')">Русский</button>
<button class="lang-btn" onclick="setLang('ar')">العربية</button>
<button class="lang-btn" onclick="setLang('hi')">हिन्दी</button>

</div>

<div class="items">

<div class="item">
<img src="https://cdn-icons-png.flaticon.com/512/1048/1048953.png">
<p id="powerbank">Power Bank</p>
</div>

<div class="item">
<img src="https://cdn-icons-png.flaticon.com/512/565/565547.png">
<p id="battery">Lithium Battery</p>
</div>

<div class="item">
<img src="https://cdn-icons-png.flaticon.com/512/2933/2933245.png">
<p id="vape">E-Cigarette</p>
</div>

<div class="item">
<img src="https://cdn-icons-png.flaticon.com/512/1534/1534938.png">
<p id="spray">Spray</p>
</div>

<div class="item">
<img src="https://cdn-icons-png.flaticon.com/512/4149/4149670.png">
<p id="gas">Gas / Flammable</p>
</div>

<div class="item">
<img src="https://cdn-icons-png.flaticon.com/512/2965/2965567.png">
<p id="knife">Sharp Objects</p>
</div>

</div>

<div class="buttons">

<button class="confirm yes" onclick="confirmYes()" id="yesbtn">มี</button>
<button class="confirm no" onclick="confirmNo()" id="nobtn">ไม่มี</button>

</div>

<audio id="beep">
<source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script>

let currentLang="th"

const speechLang={
th:"th-TH",
en:"en-US",
zh:"zh-CN",
ja:"ja-JP",
ko:"ko-KR",
es:"es-ES",
fr:"fr-FR",
de:"de-DE",
ru:"ru-RU",
ar:"ar-SA",
hi:"hi-IN"
}

const text={

title:{
th:"กรุณาตรวจสอบสิ่งของต้องห้ามก่อนโหลดสัมภาระ",
en:"Please check prohibited items before check-in baggage",
zh:"请在托运行李前检查违禁物品",
ja:"手荷物預け前に禁止物品を確認してください",
ko:"수하물 위탁 전에 금지 물품을 확인하세요",
es:"Revise artículos prohibidos antes de facturar",
fr:"Vérifiez les objets interdits avant l'enregistrement",
de:"Bitte verbotene Gegenstände prüfen",
ru:"Проверьте запрещенные предметы",
ar:"يرجى التحقق من المواد الممنوعة",
hi:"कृपया प्रतिबंधित वस्तुओं की जाँच करें"
},

yes:{
th:"มี",
en:"YES",
zh:"有",
ja:"あります",
ko:"있습니다",
es:"Sí",
fr:"Oui",
de:"Ja",
ru:"Есть",
ar:"نعم",
hi:"हाँ"
},

no:{
th:"ไม่มี",
en:"NO",
zh:"没有",
ja:"ありません",
ko:"없습니다",
es:"No",
fr:"Non",
de:"Nein",
ru:"Нет",
ar:"لا",
hi:"नहीं"
}

}

function speak(msg){

document.getElementById("beep").play()

speechSynthesis.cancel()

let u=new SpeechSynthesisUtterance(msg)

u.lang=speechLang[currentLang]

speechSynthesis.speak(u)

}

function setLang(lang){

currentLang=lang

document.getElementById("title").innerText=text.title[lang]

document.getElementById("yesbtn").innerText=text.yes[lang]

document.getElementById("nobtn").innerText=text.no[lang]

speak(text.title[lang])

}

function confirmYes(){

speak("Please contact airline staff")

}

function confirmNo(){

speak("Thank you. You may continue to check in")

}

</script>

</body>
</html>
