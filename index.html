<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Airport Kiosk 4.0 PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Inter:wght@300;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
box-sizing:border-box;
font-family:'Inter','Kanit',sans-serif;
}

body{
margin:0;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
text-align:center;
}

/* TOP BAR */

.language-bar{
background:#0f172a;
padding:12px 20px;
display:flex;
align-items:center;
justify-content:space-between;
position:sticky;
top:0;
z-index:100;
box-shadow:0 4px 15px rgba(0,0,0,.4);
}

.left,.right{
display:flex;
align-items:center;
gap:15px;
}

.center{
position:absolute;
left:50%;
transform:translateX(-50%);
}

.menu-btn{
font-size:26px;
background:none;
border:none;
color:white;
cursor:pointer;
}

.menu{
display:none;
position:absolute;
top:55px;
left:20px;
background:#1f2937;
border-radius:10px;
padding:10px;
box-shadow:0 10px 25px rgba(0,0,0,.5);
}

.menu button{
display:block;
width:160px;
margin:5px 0;
padding:8px;
border:none;
border-radius:8px;
background:#374151;
color:white;
cursor:pointer;
}

.language-bar select{
padding:8px 14px;
border-radius:10px;
border:none;
background:#1f2937;
color:white;
}

.clock{
font-size:14px;
opacity:.8;
}

/* HEADER */

header{
padding:40px 20px;
}

.logo{
opacity:.7;
margin-bottom:10px;
}

h1{
font-size:28px;
margin:10px 0;
}

#instruction{
opacity:.8;
margin-bottom:20px;
}

.message{
font-size:22px;
min-height:50px;
font-weight:500;
}

/* CARDS */

.card-group{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
padding:30px;
max-width:1200px;
margin:auto;
}

.card{
border-radius:25px;
height:200px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:18px;
padding:20px;
transition:.3s;
font-weight:500;
}

.card img{
width:70px;
margin-bottom:10px;
}

.card:hover{
transform:translateY(-6px);
}

.danger{background:#dc2626;}
.safe{background:#16a34a;}
.unknown{background:#eab308;color:black;}

.admin-panel{
display:none;
background:#1f2937;
margin:40px auto;
padding:30px;
border-radius:20px;
max-width:900px;
}

</style>
</head>

<body>

<div class="language-bar">

<div class="left">

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<div class="menu" id="menu">

<button onclick="adminLogin()">Admin Panel</button>
<button onclick="toggleFull()">Full Screen</button>
<button onclick="resetData()">Reset Data</button>

</div>

</div>

<div class="center">

<select onchange="changeLang(this.value)">
<option value="th">🇹🇭 ไทย</option>
<option value="en">🇺🇸 English</option>
<option value="zh">🇨🇳 中文</option>
<option value="ja">🇯🇵 日本語</option>
<option value="ko">🇰🇷 한국어</option>
<option value="es">🇪🇸 Español</option>
<option value="fr">🇫🇷 Français</option>
<option value="de">🇩🇪 Deutsch</option>
<option value="ru">🇷🇺 Русский</option>
<option value="ar">🇸🇦 العربية</option>
<option value="hi">🇮🇳 हिन्दी</option>
</select>

</div>

<div class="right">
<div class="clock" id="clock"></div>
</div>

</div>

<header>

<div class="logo">✈ SMART AIRPORT SYSTEM</div>

<h1 id="title"></h1>
<div id="instruction"></div>
<div class="message" id="message"></div>

</header>

<div class="card-group" id="cards"></div>

<div class="admin-panel" id="adminPanel">

<h2>Usage Statistics</h2>

<canvas id="chart"></canvas>

</div>

<script>

/* CLOCK */

setInterval(()=>{
clock.innerText=new Date().toLocaleTimeString()
},1000)

/* MENU */

function toggleMenu(){
let m=document.getElementById("menu")
m.style.display=m.style.display=="block"?"none":"block"
}

/* FULLSCREEN */

function toggleFull(){
if(!document.fullscreenElement){
document.documentElement.requestFullscreen()
}else{
document.exitFullscreen()
}
}

/* ADMIN */

function adminLogin(){

let pass=prompt("Enter Password")

if(pass=="654321"){
document.getElementById("adminPanel").style.display="block"
drawChart()
}else{
alert("Wrong password")
}

}

/* SPEECH */

let currentLang="th"

const langMap={
th:"th-TH",
en:"en-US",
zh:"zh-CN",
ja:"ja-JP",
ko:"ko-KR",
es:"es-ES",
fr:"fr-FR",
de:"de-DE",
ru:"ru-RU",
ar:"ar-SA",
hi:"hi-IN"
}

function speak(text){
speechSynthesis.cancel()
let msg=new SpeechSynthesisUtterance(text)
msg.lang=langMap[currentLang]
msg.rate=0.95
speechSynthesis.speak(msg)
}

/* IMAGES */

const images=[

"https://cdn-icons-png.flaticon.com/512/1048/1048953.png",
"https://cdn-icons-png.flaticon.com/512/3103/3103446.png",
"https://cdn-icons-png.flaticon.com/512/2933/2933245.png",
"https://cdn-icons-png.flaticon.com/512/3474/3474360.png",
"https://cdn-icons-png.flaticon.com/512/1046/1046784.png",
"https://cdn-icons-png.flaticon.com/512/616/616490.png",
"https://cdn-icons-png.flaticon.com/512/2917/2917990.png",
"https://cdn-icons-png.flaticon.com/512/3075/3075977.png",
"https://cdn-icons-png.flaticon.com/512/1828/1828843.png",
"https://cdn-icons-png.flaticon.com/512/190/190411.png"

]

/* STATS */

let stats=JSON.parse(localStorage.getItem("stats")) || Array(10).fill(0)

function saveStats(){
localStorage.setItem("stats",JSON.stringify(stats))
}

function resetData(){
stats=Array(10).fill(0)
saveStats()
alert("Data reset")
}

/* TRANSLATIONS */

const translations={

th:{
title:"สิ่งของห้ามโหลดใต้ท้องเครื่อง",
instruction:"กรุณาเลือกสิ่งของในกระเป๋าของคุณ",
items:["พาวเวอร์แบงค์","แบตเตอรี่","บุหรี่ไฟฟ้า","โน้ตบุ๊ก","ไฟแช็ก","วัตถุระเบิด","สารเคมี","อาวุธ","ไม่แน่ใจ","ไม่มีวัตถุอันตราย"],
warning:"ไม่สามารถโหลดใต้ท้องเครื่อง กรุณาถือขึ้นเครื่อง",
ask:"กรุณาสอบถามเจ้าหน้าที่สนามบิน",
safe:"ไม่มีวัตถุอันตราย สามารถโหลดกระเป๋าได้"
},

en:{
title:"Prohibited Items in Checked Baggage",
instruction:"Please select the item in your bag",
items:["Power Bank","Battery","E-Cigarette","Laptop","Lighter","Explosive","Chemical","Weapon","Unsure","No Dangerous Items"],
warning:"Not allowed in checked baggage",
ask:"Please ask airport staff",
safe:"No dangerous items detected"
}

}

/* UI */

function changeLang(lang){
currentLang=lang
loadUI()
}

function loadUI(){

let t=translations[currentLang]

title.innerText=t.title
instruction.innerText=t.instruction

cards.innerHTML=""

t.items.forEach((item,i)=>{

let c=document.createElement("div")

c.className="card"

if(i==9){
c.classList.add("safe")
}
else if(i==8){
c.classList.add("unknown")
}
else{
c.classList.add("danger")
}

let img=document.createElement("img")
img.src=images[i]

let txt=document.createElement("div")
txt.innerText=item

c.appendChild(img)
c.appendChild(txt)

c.onclick=()=>selectItem(i)

cards.appendChild(c)

})

}

function selectItem(i){

let t=translations[currentLang]

stats[i]++
saveStats()

let text=""

if(i==9){
text=t.safe
}else if(i==8){
text=t.ask
}else{
text=t.warning
}

message.innerText=text
speak(text)

}

/* CHART */

function drawChart(){

new Chart(document.getElementById("chart"),{

type:"bar",

data:{
labels:translations.th.items,
datasets:[{
label:"Usage",
data:stats
}]
}

})

}

/* START */

loadUI()

</script>

</body>
</html>
